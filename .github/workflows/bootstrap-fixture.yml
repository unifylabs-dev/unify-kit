# .github/workflows/bootstrap-fixture.yml
# Runs scripts/bootstrap-claude-config.sh against fixtures + per-hook
# manual-test recipes. Validates the 9-step recipe in spec 09 §3.
#
# Triggers: PRs that touch hooks/, scripts/, or templates/. Plus weekly
# on main (catches drift in upstream tools / runner images).
#
name: bootstrap-fixture

on:
  pull_request:
    paths:
      - 'hooks/**'
      - 'scripts/**'
      - 'templates/**'
  push:
    branches: [main]
  schedule:
    - cron: '0 5 * * 1'

permissions:
  contents: read

jobs:
  bootstrap-fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Step 1 - set up isolated home + good-fixture
        run: |
          set -euxo pipefail
          FAKE_HOME="$RUNNER_TEMP/fake-home"
          mkdir -p "$FAKE_HOME/.claude"
          cp scripts/test-fixtures/settings.json.good-fixture "$FAKE_HOME/.claude/settings.json"
          echo "FAKE_HOME=$FAKE_HOME" >> "$GITHUB_ENV"

      - name: Step 3 - bootstrap clean install
        run: |
          set -euxo pipefail
          HOME="$FAKE_HOME" scripts/bootstrap-claude-config.sh
          # Note: no backup is produced here because Step 1 pre-seeded the fake home
          # with the good-fixture, which already contains all six kit hooks correctly
          # registered. The bootstrap script correctly identifies "no merge needed"
          # and writes nothing. Backup-on-overwrite is asserted in Step 6 (--force
          # path) where it actually fires.
          # All six hook files installed and executable.
          for h in dangerous-actions-blocker pre-commit-secrets output-secrets-scanner file-guard claudemd-scanner mcp-config-integrity; do
            test -x "$FAKE_HOME/.claude/hooks/$h.sh" || { echo "ERROR: missing or non-exec $h.sh"; exit 1; }
          done
          # dangerous-actions-blocker registered (spot-check via jq).
          jq -r '.hooks.PreToolUse[].hooks[].command' "$FAKE_HOME/.claude/settings.json" \
            | grep -q 'dangerous-actions-blocker' \
            || { echo "ERROR: dangerous-actions-blocker not registered"; exit 1; }

      - name: Step 4 - re-run idempotency
        run: |
          set -euxo pipefail
          OUTPUT=$(HOME="$FAKE_HOME" scripts/bootstrap-claude-config.sh 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qiE 'no changes|already up.to.date|nothing to do' \
            || { echo "ERROR: idempotency marker not found in output"; exit 1; }

      - name: Step 5 - dry-run on fresh fake home
        run: |
          set -euxo pipefail
          FRESH_HOME="$RUNNER_TEMP/fresh-home"
          mkdir -p "$FRESH_HOME/.claude"
          HOME="$FRESH_HOME" scripts/bootstrap-claude-config.sh --dry-run
          # No settings.json created.
          if [ -f "$FRESH_HOME/.claude/settings.json" ]; then
            echo "ERROR: --dry-run created settings.json"
            exit 1
          fi
          # No hooks copied (dir absent or empty).
          if [ -d "$FRESH_HOME/.claude/hooks" ] && [ -n "$(ls -A "$FRESH_HOME/.claude/hooks" 2>/dev/null)" ]; then
            echo "ERROR: --dry-run created hook files"
            exit 1
          fi

      - name: Step 6 - --force after hook file tamper
        run: |
          set -euxo pipefail
          # Simulate a consumer tampering with a kit-shipped hook file.
          # Note: this tests file-level --force (which P3's bootstrap script
          # implements via SHA-256 manifest comparison). Entry-level --force
          # for settings.json command-path mismatches is a separate concern
          # tracked in BACKLOG.md (the merge algorithm is currently
          # append-only-dedup-by-command-string; entry-level overwrite would
          # require manifest-aware merge logic that does not exist in v0.1.x).
          target="$FAKE_HOME/.claude/hooks/dangerous-actions-blocker.sh"
          original_sha=$(shasum -a 256 "$target" 2>/dev/null | cut -d' ' -f1 || sha256sum "$target" | cut -d' ' -f1)
          echo '#!/usr/bin/env bash' > "$target"
          echo '# TAMPERED BY TEST' >> "$target"
          chmod +x "$target"
          tampered_sha=$(shasum -a 256 "$target" 2>/dev/null | cut -d' ' -f1 || sha256sum "$target" | cut -d' ' -f1)
          test "$tampered_sha" != "$original_sha" || { echo "ERROR: tamper did not change SHA"; exit 1; }
          # Force-overwrite to restore the kit version.
          HOME="$FAKE_HOME" scripts/bootstrap-claude-config.sh --force
          # Original SHA restored.
          restored_sha=$(shasum -a 256 "$target" 2>/dev/null | cut -d' ' -f1 || sha256sum "$target" | cut -d' ' -f1)
          test "$restored_sha" = "$original_sha" || { echo "ERROR: --force did not restore original hook content (sha=$restored_sha, expected=$original_sha)"; exit 1; }
          # Backup of tampered version exists and contains the tampered content.
          backup=$(find "$(dirname "$target")" -maxdepth 1 -name "$(basename "$target").bak.*" | head -1)
          test -n "$backup" || { echo "ERROR: --force did not back up tampered hook"; exit 1; }
          grep -q 'TAMPERED BY TEST' "$backup" || { echo "ERROR: backup does not contain tampered content"; exit 1; }

      - name: Step 7 - per-hook manual-test recipes
        run: scripts/ci/run-hook-recipes.sh "$FAKE_HOME"

      - name: Step 8 - audit-scan good-fixture
        run: scripts/audit-scan.sh scripts/test-fixtures/settings.json.good-fixture

      - name: Step 9 - audit-scan bad-fixture
        run: |
          set -euxo pipefail
          if scripts/audit-scan.sh scripts/test-fixtures/settings.json.bad-fixture > out.txt 2>&1; then
            cat out.txt
            echo "ERROR: audit-scan should have exited non-zero on bad-fixture"
            exit 1
          fi
          cat out.txt
          grep -q 'inline-credential' out.txt || { echo "ERROR: missing inline-credential finding"; exit 1; }
          grep -q 'unrestricted-mcp' out.txt || { echo "ERROR: missing unrestricted-mcp finding"; exit 1; }
          grep -q 'missing-hook-file' out.txt || { echo "ERROR: missing missing-hook-file finding"; exit 1; }

  init-project-fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: "Step 1 - init-project: clean install into empty target"
        run: |
          set -euxo pipefail
          TGT="$RUNNER_TEMP/init-empty"
          mkdir -p "$TGT"
          scripts/init-project.sh "$TGT" \
            --config scripts/test-fixtures/init-project/init-project-test-config.yml
          # 11 one-shot targets present.
          for f in CHEATSHEET.md CLAUDE.md llms.txt \
                   docs/ai-usage-charter.md docs/mcp-policy.md docs/security-checklist.md docs/specs/README.md \
                   onboarding/team-onboarding.md \
                   .github/pull_request_template.md \
                   .github/ISSUE_TEMPLATE/feature_request.yml .github/ISSUE_TEMPLATE/bug_report.yml; do
            test -f "$TGT/$f" || { echo "ERROR: missing $f"; exit 1; }
          done
          # Manifest exists + valid JSON.
          test -f "$TGT/.unify-kit-project-manifest.json"
          jq -e . "$TGT/.unify-kit-project-manifest.json" > /dev/null
          # No unsubstituted placeholders anywhere.
          if grep -rohE '\{\{[A-Z][A-Z0-9_]*\}\}' "$TGT"; then
            echo "ERROR: unsubstituted placeholders remain"; exit 1
          fi

      - name: "Step 2 - init-project: backup-on-overwrite for legacy CLAUDE.md"
        run: |
          set -euxo pipefail
          TGT="$RUNNER_TEMP/init-partial"
          mkdir -p "$TGT"
          cp scripts/test-fixtures/init-project/partial/CLAUDE.md "$TGT/CLAUDE.md"
          scripts/init-project.sh "$TGT" \
            --config scripts/test-fixtures/init-project/init-project-test-config.yml \
            --force
          # Legacy CLAUDE.md backed up.
          backup=$(find "$TGT" -maxdepth 1 -name 'CLAUDE.md.bak.*' | head -1)
          test -n "$backup" || { echo "ERROR: legacy CLAUDE.md not backed up"; exit 1; }
          grep -q '2-space indent' "$backup" || { echo "ERROR: backup does not contain legacy content"; exit 1; }
          # Kit version installed.
          grep -q 'TestProject' "$TGT/CLAUDE.md" || { echo "ERROR: kit version not written"; exit 1; }

      - name: "Step 3 - init-project: re-run idempotency"
        run: |
          set -euxo pipefail
          TGT="$RUNNER_TEMP/init-empty"
          OUTPUT=$(scripts/init-project.sh "$TGT" \
            --config scripts/test-fixtures/init-project/init-project-test-config.yml 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qiE 'no changes needed|up.to.date' \
            || { echo "ERROR: idempotency marker missing"; exit 1; }
          # No new backups in target.
          new_baks=$(find "$TGT" -name '*.bak.*' 2>/dev/null || true)
          test -z "$new_baks" || { echo "ERROR: idempotent run created backups: $new_baks"; exit 1; }

      - name: "Step 4 - init-project: --dry-run writes nothing"
        run: |
          set -euxo pipefail
          TGT="$RUNNER_TEMP/init-dry"
          mkdir -p "$TGT"
          scripts/init-project.sh "$TGT" \
            --config scripts/test-fixtures/init-project/init-project-test-config.yml \
            --dry-run
          created=$(find "$TGT" -type f 2>/dev/null || true)
          test -z "$created" || { echo "ERROR: --dry-run created files: $created"; exit 1; }

      - name: "Step 5 - init-project: --force restores tampered target"
        run: |
          set -euxo pipefail
          TGT="$RUNNER_TEMP/init-partial"
          orig_sha=$(shasum -a 256 "$TGT/CLAUDE.md" | cut -d' ' -f1)
          echo '# tampered' > "$TGT/CLAUDE.md"
          scripts/init-project.sh "$TGT" \
            --config scripts/test-fixtures/init-project/init-project-test-config.yml \
            --force
          restored_sha=$(shasum -a 256 "$TGT/CLAUDE.md" | cut -d' ' -f1)
          test "$restored_sha" = "$orig_sha" || { echo "ERROR: --force did not restore original (sha=$restored_sha, want=$orig_sha)"; exit 1; }
          # Tampered version backed up — find the backup containing the tampered marker
          # (one of N backups in this dir; we don't rely on mtime ordering).
          tampered_bak=""
          for bak in "$TGT"/CLAUDE.md.bak.*; do
            [ -f "$bak" ] || continue
            if grep -q '^# tampered$' "$bak"; then
              tampered_bak="$bak"
              break
            fi
          done
          test -n "$tampered_bak" \
            || { echo "ERROR: no backup contains tampered content"; find "$TGT" -name 'CLAUDE.md.bak.*'; exit 1; }

      - name: "Step 6 - init-project: --with-ci-templates --snippets=nextjs"
        run: |
          set -euxo pipefail
          TGT="$RUNNER_TEMP/init-ci"
          mkdir -p "$TGT"
          scripts/init-project.sh "$TGT" \
            --config scripts/test-fixtures/init-project/init-project-test-config.yml \
            --with-ci-templates --snippets=nextjs
          test -f "$TGT/.github/workflows/ci.yml" || { echo "ERROR: ci.yml missing"; exit 1; }
          test -f "$TGT/.github/workflows/nightly.yml" || { echo "ERROR: nightly.yml missing"; exit 1; }
          test -x "$TGT/scripts/ci-test-split.sh" || { echo "ERROR: ci-test-split.sh missing or not executable"; exit 1; }
          count=$(find "$TGT/docs/snippets" -name '*.md' | wc -l)
          test "$count" -eq 5 || { echo "ERROR: expected 5 snippets, got $count"; exit 1; }
          jq -e . "$TGT/.unify-kit-project-manifest.json" > /dev/null
          if grep -rohE '\{\{[A-Z][A-Z0-9_]*\}\}' "$TGT"; then
            echo "ERROR: unsubstituted placeholders remain"; exit 1
          fi
